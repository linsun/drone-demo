apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: frontend-httproute
  namespace: default
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: default
    group: gateway.networking.k8s.io
    kind: Gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/"
    backendRefs:
    - name: frontend
      port: 80
      kind: Service
      group: ""
